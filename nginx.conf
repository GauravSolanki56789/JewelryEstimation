# =============================================================
# Nginx Reverse-Proxy Config — Gaurav Softwares Jewelry App
# Deploy to: /etc/nginx/sites-available/gauravsoftwares.tech
# Enable:    sudo ln -s /etc/nginx/sites-available/gauravsoftwares.tech \
#                       /etc/nginx/sites-enabled/
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
# =============================================================

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gauravsoftwares.tech www.gauravsoftwares.tech;

    # Let Certbot manage the ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gauravsoftwares.tech www.gauravsoftwares.tech;

    # --- TLS (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/gauravsoftwares.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gauravsoftwares.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # --- Proxy to Express ---
    location / {
        proxy_pass         http://127.0.0.1:3000;

        # -------------------------------------------------------
        # THE THREE HEADERS THAT PREVENT THE REDIRECT LOOP:
        #
        # 1. Host           — keeps the original hostname so OAuth
        #                     callback URLs resolve correctly.
        # 2. X-Real-IP      — real visitor IP for logging/rate-limits.
        # 3. X-Forwarded-For — chain of proxies; Express reads this
        #                     when trust proxy is set.
        # 4. X-Forwarded-Proto — tells Express the original scheme was
        #                        HTTPS. Without this, Express sees HTTP
        #                        and refuses to set secure=true cookies,
        #                        so the browser never sends them back,
        #                        and isAuthenticated() is always false.
        # -------------------------------------------------------
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass HTTP version and keep-alive so WebSocket upgrades work
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Generous timeouts for long-running API calls / Tally sync
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Do NOT buffer the response body; stream it straight through.
        # Buffering can strip Set-Cookie headers on large responses.
        proxy_buffering    off;
        proxy_request_buffering off;
    }

    # Static file caching (images, CSS, JS served from Express /public)
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|woff2?|ttf|eot)$ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }

    # Uploads directory — longer cache, no auth needed
    location /uploads/ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires          30d;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Max upload size (product images)
    client_max_body_size 20M;
}
